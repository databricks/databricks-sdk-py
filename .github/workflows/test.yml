name: Test Workflow

on:
  workflow_call:
    inputs:
        os:
            required: true
            type: string
        pyVersion:
            required: true
            type: string

jobs:
  test:
    strategy:
        fail-fast: false
    runs-on: ${{ inputs.os }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0

      - name: Unshallow
        run: git fetch --prune --unshallow

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          version: "0.6.5"
          python-version: ${{ inputs.pyVersion }}

      - name: Setup JFrog PyPI proxy
        uses: ./.github/actions/setup-jfrog-pypi

      # Re-lock so uv.lock matches the JFrog-configured UV_INDEX_URL.
      # Keeps the same versions; only registry URLs change. Ephemeral (not committed).
      - name: Re-lock for JFrog
        shell: bash
        run: uv lock

      - name: Run tests
        run: make dev test

      - name: Publish test coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
